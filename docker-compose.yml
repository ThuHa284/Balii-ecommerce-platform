version: "3.9"

services:

  # ============================================================
  # PostgreSQL
  # ============================================================
  postgres:
    image: postgres:16
    container_name: balii-postgres
    restart: always
    environment:
      POSTGRES_USER: balii_admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: balii_sleepwear
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - balii-network

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7
    container_name: balii-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - balii-network

  # ============================================================
  # Zookeeper
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: balii-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - balii-network

  # ============================================================
  # Kafka
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: balii-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - balii-network

  # ============================================================
  # Elasticsearch
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: balii-elasticsearch
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - balii-network

  # ============================================================
  # Kibana
  # ============================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: balii-kibana
    restart: always
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - balii-network

  # ============================================================
  # MinIO
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: balii-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - balii-network

  # ============================================================
  # Camunda BPMN
  # ============================================================
  camunda:
    image: camunda/camunda-bpm-platform:run-latest
    container_name: balii-camunda
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/balii_sleepwear
      DB_USERNAME: balii_admin
      DB_PASSWORD: 123456
    depends_on:
      - postgres
    networks:
      - balii-network

  # ============================================================
  # Qdrant Vector DB
  # ============================================================
  qdrant:
    image: qdrant/qdrant
    container_name: balii-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - balii-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  qdrant_data:

networks:
  balii-network:
    driver: bridge